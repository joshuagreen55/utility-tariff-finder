# Local / single-VM production stack (Google Cloud VM friendly)
#
# Usage:
#   cp .env.docker.example .env   # then edit secrets
#   docker compose up -d --build
#   docker compose exec api alembic upgrade head
#
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: utility_tariff_finder
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utility_tariff_finder"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256m

  api:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/utility_tariff_finder}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/utility_tariff_finder}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      # Phase 6: Gemini Deep Research fallback. Fires only when Phases 1-5
      # return zero tariffs. Guarded by a 20-min wall cap and a 3M token
      # ceiling per call to keep costs bounded.
      PHASE6_ENABLED: ${PHASE6_ENABLED:-1}
      PHASE6_MAX_WAIT_SEC: ${PHASE6_MAX_WAIT_SEC:-1200}
      PHASE6_MAX_TOKENS: ${PHASE6_MAX_TOKENS:-3000000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    deploy:
      resources:
        limits:
          memory: 4g

  celery-worker:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/utility_tariff_finder}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/utility_tariff_finder}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0}
      # Phase 6 Deep Research fallback (see api service above for details).
      PHASE6_ENABLED: ${PHASE6_ENABLED:-1}
      PHASE6_MAX_WAIT_SEC: ${PHASE6_MAX_WAIT_SEC:-1200}
      PHASE6_MAX_TOKENS: ${PHASE6_MAX_TOKENS:-3000000}
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=8 --prefetch-multiplier=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g

  celery-beat:
    build: ./backend
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0}
    command: celery -A app.tasks.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
  caddy_data:
  caddy_config:
